<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiAI Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>
  <div class="bg-grid"></div>

  <header class="topbar">
    <div class="brand" aria-label="MultiAI logo">
      <span class="brand-mark">M</span>
      <span class="brand-text">MultiAI</span>
    </div>

    <a class="contact-link" href="mailto:contact@multiai.dev">Contact</a>
  </header>

  <main class="hero">
    <section class="orbit-scene" aria-label="Futuristic AI orbit interface">
      <div class="scene-ring ring-1"></div>
      <div class="scene-ring ring-2"></div>
      <div class="scene-ring ring-3"></div>

      <div class="energy-trail trail-a"></div>
      <div class="energy-trail trail-b"></div>

      <div class="pole" aria-hidden="true">
        <div class="pole-core"></div>
        <div class="pole-cap pole-cap-top"></div>
        <div class="pole-cap pole-cap-bottom"></div>
        <div class="pole-glint"></div>
      </div>

      <div class="orbit-track" id="orbit-track" aria-label="AI tools orbiting the center pole">
        <button class="orbit-tab" type="button" data-ai="vision" style="--i:0; --tab-accent:#76f7ff;">
          <span class="tab-icon">01</span>
          <span class="tab-label">Vision AI</span>
        </button>
        <button class="orbit-tab" type="button" data-ai="chat" style="--i:1; --tab-accent:#b68cff;">
          <span class="tab-icon">02</span>
          <span class="tab-label">Chat AI</span>
        </button>
        <button class="orbit-tab" type="button" data-ai="code" style="--i:2; --tab-accent:#68ffd1;">
          <span class="tab-icon">03</span>
          <span class="tab-label">Code AI</span>
        </button>
        <button class="orbit-tab" type="button" data-ai="audio" style="--i:3; --tab-accent:#ff7ad9;">
          <span class="tab-icon">04</span>
          <span class="tab-label">Audio AI</span>
        </button>
      </div>
    </section>

    <section class="center-copy" aria-label="Multi-agent control core description">
      <p class="eyebrow">Multi-agent control core</p>
      <h1>Orbiting intelligence, centered on one command pole.</h1>
      <p class="lede">A holographic interface inspired by the future of AI orchestration. Tabs rotate in a DNA-like motion around a metallic core, creating a live high-tech display.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
